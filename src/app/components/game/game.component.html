<div class="game">
  <div
    class="board"
    [ngStyle]="{ '--columns-count': columnsCount, '--card-width': cardSize }"
  >
    <card-cell
      *ngFor="let card of cardCells; let cardIndex = index"
      [card]="card"
      [cardIndex]="cardIndex"
      (flippedCardIndex)="onCardClick($event)"
    ></card-cell>
  </div>
  <button type="button" class="backBtn" [routerLink]="['/']" aria-label="Back to levels">
    <img src="/assets/back_btn.png" alt="Back" />
  </button>
  <popup #popup (navNextLevel)="nextLevel()"></popup>
</div>
